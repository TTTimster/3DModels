<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Non-module version (required for Framer Embed) -->
  <script src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
      overflow: hidden;
    }
    model-viewer {
      width: 100%;
      height: 100%;
      background: #000;
      display: block;
    }
  </style>
</head>

<body>
  <model-viewer
    src=src="VanV2blend.glb"
    camera-controls
    auto-rotate
    shadow-intensity="1"
  ></model-viewer>
</body>
</html>
